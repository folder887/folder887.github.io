server:
  port: 8082

spring:
  application:
    name: paycore-settlement
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/paycore}
    username: ${SPRING_DATASOURCE_USERNAME:paycore}
    password: ${SPRING_DATASOURCE_PASSWORD:secret}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: false

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: paycore-settlement
      auto-offset-reset: earliest
      enable-auto-commit: false
    producer:
      acks: all
      retries: 5

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    tags:
      service: paycore-settlement

paycore:
  settlement:
    batch-interval-ms: 1800000   # 30 minutes
    batch-age-hours: 1           # settle batches older than 1 hour
    max-batch-size: 10000        # force flush after 10k transactions
