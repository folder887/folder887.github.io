server:
  port: 8080
  ssl:
    enabled: false  # В production — true, сертификаты из Vault/k8s secrets
  tomcat:
    threads:
      max: 200
      min-spare: 20

spring:
  application:
    name: paycore-gateway
  threads:
    virtual:
      enabled: true   # Java 21 Virtual Threads
  autoconfigure:
    exclude:
      - io.github.resilience4j.springboot3.micrometer.autoconfigure.TimerAutoConfiguration
      - io.github.resilience4j.springboot3.micrometer.autoconfigure.ReactorTimerAutoConfiguration

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/paycore}
    username: ${SPRING_DATASOURCE_USERNAME:paycore}
    password: ${SPRING_DATASOURCE_PASSWORD:secret}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 10000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: 6379
      password: ${SPRING_REDIS_PASSWORD:secret}
      timeout: 1000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all           # Все реплики должны подтвердить
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
        request.timeout.ms: 5000
        delivery.timeout.ms: 10000
        spring.json.add.type.headers: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      service: paycore-gateway

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

resilience4j:
  circuitbreaker:
    instances:
      processing-service:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
  ratelimiter:
    instances:
      payment-api:
        limitForPeriod: 1000
        limitRefreshPeriod: 1s
        timeoutDuration: 100ms
  timelimiter:
    instances:
      processing-service:
        timeoutDuration: 5s

paycore:
  gateway:
    pan-pepper: ${PAYCORE_PAN_PEPPER:deadbeefdeadbeefdeadbeefdeadbeef}
    idempotency-ttl-seconds: 86400   # 24 часа
    rate-limit:
      per-merchant-per-second: 100
      per-ip-per-minute: 300
    timeout:
      processing-ms: 15000   # increased for real acquirer calls (YooKassa ~2-5s)
      fraud-ms: 500
  vault:
    addr: ${VAULT_ADDR:http://localhost:8200}
    token: ${VAULT_TOKEN:root}
    secret-path: secret/paycore/gateway

logging:
  pattern:
    console: >-
      {"timestamp":"%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ}","level":"%level",
      "service":"paycore-gateway","traceId":"%X{traceId}","spanId":"%X{spanId}",
      "logger":"%logger{36}","message":"%message"}%n
  level:
    ru.paycore: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
