global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:8080']
    metrics_path: '/actuator/prometheus'

  - job_name: 'processing'
    static_configs:
      - targets: ['processing:8081']
    metrics_path: '/actuator/prometheus'

  - job_name: 'settlement'
    static_configs:
      - targets: ['settlement:8082']
    metrics_path: '/actuator/prometheus'

  - job_name: 'router'
    static_configs:
      - targets: ['router:8083']
    metrics_path: '/metrics'

  - job_name: 'fraud'
    static_configs:
      - targets: ['fraud:8084']
    metrics_path: '/metrics'
